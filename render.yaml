services:
  - type: web
    name: temp-chat-backend
    env: python
    plan: free
    repo: ""
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ALLOW_ORIGINS
        value: "https://your-frontend.vercel.app"
